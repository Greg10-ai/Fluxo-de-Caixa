<!DOCTYPE html>
    <html>
    <head>
        <title>Painel SAP</title>
        <style>
            body {
                font-family: Arial;
                text-align: center;
                margin-top: 50px;
            }
            button {
                padding: 15px 30px;
                font-size: 18px;
                background-color: #28a745;
                color: white;
                border: none;
                border-radius: 5px;
                cursor: pointer;
            }
            button:hover {
                background-color: #218838;
            }
            #status {
                margin-top: 20px;
                font-size: 16px;
            }
        </style>
    </head>
    <body>

        <h1>🚀 Integração SAP → Google Sheets</h1>

        <button onclick="executar()">Iniciar Processo</button>

        <div id="status"></div>

        <script>
async function executar() {
    const status = document.getElementById("status");

    status.innerHTML = "⏳ Enviando requisição...";

    try {
        const response = await fetch('/executar', {
            method: 'GET',
            headers: {
                'Authorization': '123456'
            }
        });

        const data = await response.json();

        console.log(data);

        if (response.status === 200) {
            status.innerHTML = "✅ " + data.mensagem;
        } else {
            status.innerHTML = "❌ " + data.mensagem;
        }

    } catch (error) {
        console.error(error);
        status.innerHTML = "❌ Erro na requisição";
    }
}
</script>

    </body>
    </html>
